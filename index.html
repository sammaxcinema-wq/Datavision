    return (c === 'x' ? r : (r & 0x3) | 0x8).toString(16);

  references: [{ id: crypto.randomUUID(), name: "", title: "", company: "", phone: "", email: "" }],

const normalizeCV = (raw) => {
  const base = createEmptyCV();
  if (!raw || typeof raw !== 'object') return base;
  return {
    ...base,
    ...raw,
    personalInfo: { ...base.personalInfo, ...(raw.personalInfo || {}) },
    experience: Array.isArray(raw.experience) ? raw.experience.map(e => ({ ...e, bullets: Array.isArray(e.bullets) ? e.bullets : [""] })) : base.experience,

    atsMode: typeof raw.atsMode === 'boolean' ? raw.atsMode : base.atsMode,

};

const levelLabel = (p) => {
  if (p >= 90) return "Expert";
  if (p >= 70) return "Advanced";
  if (p >= 50) return "Intermediate";
  return "Beginner";
};

// ---------- ADVANCED ATS SCORE ----------
const computeATSScore = (cv) => {
  let score = 0; const tips = [];
  const pi = cv.personalInfo || {};
  if (pi.name?.trim()) score += 5; else tips.push("➕ Add full name");
  if (pi.email?.trim()) score += 5; else tips.push("📧 Professional email required");
  if (pi.phone?.trim()) score += 4; else tips.push("📞 Phone number missing");
  if (pi.location?.trim()) score += 3; else tips.push("📍 Add location (city/state)");
  if (pi.linkedin?.trim()) score += 3; else tips.push("🔗 LinkedIn boosts credibility");
  if (pi.summary?.trim().length > 80) score += 10; else tips.push("✍️ Write summary 80+ chars (impact)");
  const allBullets = cv.experience?.flatMap(e => e.bullets || []).join(" ").toLowerCase() || "";
  const kw = ["achieved","managed","increased","reduced","delivered","led","improved","built","%","revenue","developed"];
  const kwCount = kw.filter(k => allBullets.includes(k)).length;
  score += Math.min(kwCount * 3, 15);
  if (kwCount < 3) tips.push("📊 Use metrics: 'achieved', 'managed', % growth");
  if (cv.experience?.some(e => e.bullets?.some(b => b.trim().length > 10))) score += 10; else tips.push("📌 Add bullet points to experience");
  if ((cv.experience?.length || 0) >= 2) score += 10; else tips.push("💼 Add 2+ work experiences");
  if (cv.education?.some(e => e.institution?.trim())) score += 10; else tips.push("🎓 Include education institution");
  if (cv.education?.some(e => e.degree?.trim())) score += 5; else tips.push("🏅 Specify degree");
  const skillCount = cv.skills?.filter(s => s.name?.trim()).length || 0;
  score += Math.min(skillCount * 2, 15);
  if (skillCount < 5) tips.push("⚙️ Add 5+ relevant skills");
  if (cv.certifications?.some(c => c.name?.trim())) score += 5;
  if (cv.hobbies?.trim()) score += 2;
  return { score: Math.min(score, 100), tips };
};
